version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: price_tracker_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - price_tracker_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: price_tracker_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/price_tracker
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - price_tracker_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: price_tracker_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - price_tracker_net

networks:
  price_tracker_net:
    driver: bridge

volumes:
  mongodb_data:
